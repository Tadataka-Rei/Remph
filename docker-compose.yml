services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: REMPH
    ports:
      - "5000:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/Create_database.sql:/docker-entrypoint-initdb.d/Create_database.sql:ro

  server:
    container_name: backend
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: REMPH
volumes:
  pgdata:
